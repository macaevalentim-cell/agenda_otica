services:
  - type: web
    name: agenda-medica
    env: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: agenda-medica-db
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: FRONTEND_URL
        value: https://agenda-medica.onrender.com   # Substitua pelo nome do seu serviço